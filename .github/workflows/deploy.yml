name: Deploy Detection Rules to Splunk

on:
  push:
    branches:
      - main
    paths:
      - 'rules/splunk/**.json'
      - 'deploy_to_splunk.py'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: # Test məqsədilə manual işə salmağa imkan verir

jobs:
  deploy-splunk-rules:
    name: Sync Rules with Splunk Enterprise API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # requirements.txt faylı varsa oxuyur, yoxdursa birbaşa requests yükləyir
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install requests; fi

      - name: Execute Splunk Deployment Script
        env:
          SPLUNK_HOST: "https://9.223.115.161:8089"
          SPLUNK_TOKEN: ${{ secrets.SPLUNK_TOKEN }}
        run: |
          python deploy_to_splunk.py
