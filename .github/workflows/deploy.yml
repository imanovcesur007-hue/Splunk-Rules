name: Deploy Detection Rules to Splunk SİEM

on:
  push:
    branches:
      - main
    paths:
      - 'rules/splunk/*.json'
      - 'deploy_to_splunk.py'
  workflow_dispatch: # Manual tetikləmə üçün

jobs:
  deploy-rules:
    runs-on: ubuntu-latest
    
    steps:
      - name: Repozitoriyanı klonla
        uses: actions/checkout@v4

      - name: Python mühitini qur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Asılılıqları yüklə (Requests)
        run: |
          python -m pip install --upgrade pip
          pip install requests urllib3

      - name: Splunk-a Rule-ları Göndər
        env:
          SPLUNK_HOST: "https://9.223.115.161:8089"
          SPLUNK_TOKEN: ${{ secrets.SPLUNK_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT: ${{ secrets.TELEGRAM_CHAT }}
        run: |
          python deploy_to_splunk.py
