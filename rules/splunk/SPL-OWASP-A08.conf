index=* (sourcetype=access_combined OR sourcetype=docker* OR source=*nginx* OR source=*apache*) (uri="*rO0AB*" OR uri="*O:*" OR uri="*/actuator*" OR uri="*/jenkins*" OR uri="*.gitlab-ci.yml*" OR uri="*php://input*")
| eval src_ip=coalesce(clientip, src_ip, src), uri=coalesce(uri, uri_path, url), http_method=coalesce(method, http_method)
| eval decoded_uri=urldecode(uri)
| where match(decoded_uri, "(?i)(rO0AB|O:[0-9]+:|/actuator/env|/actuator/heapdump|/jenkins/script|\\.gitlab-ci\\.yml|php://input)")
| stats count, values(status) as status by src_ip, uri, http_method, host, index
| eval is_successful=if(match(status, "200"), "Yes", "No")
| eval attack_type="OWASP A08: Integrity Failures (Insecure Deserialization / CI-CD Exploitation)", severity=if(is_successful=="Yes", "Critical", "High"), dest="millibluesec.online", time_formatted=strftime(now(), "%Y-%m-%d %H:%M:%S"), recommendation="Validate and sanitize all serialized data. Do not deserialize untrusted data. Restrict public access to CI/CD pipelines (Jenkins, GitLab) and Spring Boot Actuator endpoints."
