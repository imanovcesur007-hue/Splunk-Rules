index=* (sourcetype=access_combined OR sourcetype=docker* OR source=*nginx* OR source=*apache*) 
| eval src_ip=coalesce(clientip, src_ip, src), user_agent=coalesce(useragent, http_user_agent, user_agent), uri=coalesce(uri, uri_path, url), http_method=coalesce(method, http_method) 
| search user_agent="*" 
| where match(user_agent, "(?i)(sqlmap|nikto|nmap|zgrab|nuclei|dirbuster|gobuster|hydra|curl|wget|python-requests|java/|postmanruntime)") 
| stats count, values(uri) as targeted_uris by src_ip, user_agent, host, index 
| where count > 5 
| eval attack_type="OWASP A04: Insecure Design (Automated Security Scanners / Bot Traffic)", severity="High", dest="millibluesec.online", time_formatted=strftime(now(), "%Y-%m-%d %H:%M:%S"), recommendation="Implement rate limiting and robust bot protection. Block known malicious User-Agents at the WAF or Nginx level."
