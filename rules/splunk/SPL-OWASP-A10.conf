index=* (sourcetype=access_combined OR sourcetype=docker* OR source=*nginx* OR source=*apache*) (uri="*url=*" OR uri="*proxy=*" OR uri="*fetch=*" OR uri="*dest=*" OR uri="*redirect=*" OR uri="*169.254.169.254*" OR uri="*127.0.0.1*" OR uri="*localhost*")
| eval src_ip=coalesce(clientip, src_ip, src), uri=coalesce(uri, uri_path, url), http_method=coalesce(method, http_method)
| eval decoded_uri=urldecode(uri)
| where match(decoded_uri, "(?i)(url=|proxy=|fetch=|dest=|redirect=|uri=).*?(169\\.254\\.169\\.254|127\\.0\\.0\\.1|localhost|::1|10\\.\\d+\\.\\d+\\.\\d+|192\\.168\\.\\d+\\.\\d+|172\\.(1[6-9]|2[0-9]|3[0-1])\\.\\d+\\.\\d+)")
| stats count, values(status) as status by src_ip, uri, http_method, host, index
| eval is_successful=if(match(status, "200"), "Yes", "No")
| eval attack_type="OWASP A10: Server-Side Request Forgery (SSRF)", severity=if(is_successful=="Yes", "Critical", "High"), dest="millibluesec.online", time_formatted=strftime(now(), "%Y-%m-%d %H:%M:%S"), recommendation="Validate and sanitize all user-supplied URLs. Implement a strict allowlist for outbound requests. Block access to cloud metadata (169.254.169.254) and internal IPs from the application layer."
