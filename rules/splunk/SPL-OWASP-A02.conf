index=* (sourcetype=access_combined OR sourcetype=docker* OR source=*nginx* OR source=*apache*) 
| eval src_ip=coalesce(clientip, src_ip, src), uri=coalesce(uri, uri_path, url), http_method=coalesce(method, http_method) 
| search http_method=GET AND (uri="*password=*" OR uri="*passwd=*" OR uri="*token=*" OR uri="*api_key=*" OR uri="*secret=*" OR uri="*session_id=*" OR uri="*jwt=*") 
| stats count, values(status) as status by src_ip, uri, http_method, host, index 
| eval attack_type="OWASP A02: Cryptographic Failures", severity="Critical", dest="millibluesec.online", time_formatted=strftime(now(), "%Y-%m-%d %H:%M:%S"), recommendation="Never transmit sensitive credentials or tokens in GET parameters."
