index=* (sourcetype=access_combined OR sourcetype=docker* OR source=*nginx* OR source=*apache*) (uri="*/var/log/*" OR uri="*.log" OR uri="*access_log*" OR uri="*error_log*" OR uri="*audit.log*" OR uri="*wevtutil*" OR uri="*rm%20*log*")
| eval src_ip=coalesce(clientip, src_ip, src), uri=coalesce(uri, uri_path, url), http_method=coalesce(method, http_method)
| eval decoded_uri=urldecode(uri)
| where match(decoded_uri, "(?i)(/var/log/|\\.log$|access_log|error_log|audit\\.log|wevtutil\\s+cl|rm\\s+.*?\\.log|echo\\s+.*?\\>\\s+.*?\\.log)")
| stats count, values(status) as status by src_ip, uri, http_method, host, index
| eval is_successful=if(match(status, "200"), "Yes", "No")
| eval attack_type="OWASP A09: Logging/Monitoring Failures (Log Tampering & Exposure)", severity=if(is_successful=="Yes", "Critical", "High"), dest="millibluesec.online", time_formatted=strftime(now(), "%Y-%m-%d %H:%M:%S"), recommendation="Ensure log directories (/var/log) are strictly restricted from web access. Forward all logs to a centralized, immutable SIEM immediately. Implement File Integrity Monitoring (FIM)."
