index=* (sourcetype=access_combined OR sourcetype=docker* OR source=*nginx* OR source=*apache*) (uri="*${jndi:*" OR uri="*${sys:*" OR uri="*${env:*" OR uri="*class.module.classLoader*" OR uri="*Struts*" OR uri="*wp-content/plugins*")
| eval src_ip=coalesce(clientip, src_ip, src), uri=coalesce(uri, uri_path, url), http_method=coalesce(method, http_method)
| eval decoded_uri=urldecode(uri)
| where match(decoded_uri, "(?i)(\\$\\{jndi:(ldap|rmi|dns)|\\$\\{sys:|\\$\\{env:|class\\.module\\.classLoader|OgnlContext|struts\\.action|wp-content/plugins/.*?/(readme\\.txt|changelog\\.txt))")
| stats count, values(status) as status by src_ip, uri, http_method, host, index
| eval is_successful=if(match(status, "200"), "Yes", "No")
| eval attack_type="OWASP A06: Vulnerable Components (Log4j / Spring4Shell / Struts / Plugins)", severity=if(is_successful=="Yes", "Critical", "High"), dest="millibluesec.online", time_formatted=strftime(now(), "%Y-%m-%d %H:%M:%S"), recommendation="Patch framework vulnerabilities immediately (e.g., Log4j, Spring, Apache Struts). Remove unused WordPress plugins. Deploy WAF rules blocking JNDI and OGNL expressions."
