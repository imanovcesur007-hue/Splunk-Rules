index=* (sourcetype=access_combined OR sourcetype=docker* OR source=*nginx* OR source=*apache*) (uri="*select*" OR uri="*union*" OR uri="*insert*" OR uri="*drop*" OR uri="*script*" OR uri="*alert*" OR uri="*1=1*" OR uri="*etc/passwd*" OR uri="*cmd.exe*" OR uri="*%27*" OR uri="*%3C*")
| eval src_ip=coalesce(clientip, src_ip, src), uri=coalesce(uri, uri_path, url), http_method=coalesce(method, http_method)
| eval decoded_uri=urldecode(uri)
| where match(decoded_uri, "(?i)(union\\s+select|select\\s+.*from|insert\\s+into|drop\\s+table|xp_cmdshell|1=1|1'='1|--|<script>|javascript:|onerror=|onload=|alert\\(|/etc/passwd|/bin/bash|cmd\\.exe)")
| stats count, values(status) as status by src_ip, uri, http_method, host, index
| eval attack_type="OWASP A03: Injection (SQLi / XSS / OS Command)", severity="Critical", dest="millibluesec.online", time_formatted=strftime(now(), "%Y-%m-%d %H:%M:%S"), recommendation="Implement parameterized queries (SQLi), sanitize inputs, use output encoding (XSS), and deploy a Web Application Firewall (WAF) to block malicious payloads."
