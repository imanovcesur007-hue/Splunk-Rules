index=* (sourcetype=access_combined OR sourcetype=docker* OR source=*nginx* OR source=*apache*) (uri="*/phpinfo*" OR uri="*/server-status*" OR uri="*.htpasswd*" OR uri="*.htaccess*" OR uri="*web.config*" OR uri="*.kube/config*" OR uri="*docker-compose.yml*" OR uri="*.aws/credentials*" OR uri="*.ssh/id_rsa*")
| eval src_ip=coalesce(clientip, src_ip, src), uri=coalesce(uri, uri_path, url), http_method=coalesce(method, http_method)
| stats count, values(status) as status by src_ip, uri, http_method, host, index
| eval is_successful=if(match(status, "200"), "Yes", "No")
| eval attack_type="OWASP A05: Security Misconfiguration (Exposed Configs & Status)", severity=if(is_successful=="Yes", "Critical", "Medium"), dest="millibluesec.online", time_formatted=strftime(now(), "%Y-%m-%d %H:%M:%S"), recommendation="Review web server configurations. Immediately block public access to .htaccess, .kube, .aws, and server-status pages. Ensure directory listing is disabled."
