index=* (sourcetype=access_combined OR sourcetype=docker* OR source=*nginx* OR source=*apache*) http_method=POST (uri="*/login*" OR uri="*/auth*" OR uri="*/signin*" OR uri="*/api/token*")
| eval src_ip=coalesce(clientip, src_ip, src), uri=coalesce(uri, uri_path, url), http_method=coalesce(method, http_method)
| stats count as total_attempts, count(eval(status=401 OR status=403)) as failed_attempts, count(eval(status=200 OR status=302)) as successful_attempts by src_ip, uri, host, index
| where failed_attempts >= 5
| eval is_compromised=if(successful_attempts > 0, "Yes", "No")
| eval attack_type="OWASP A07: Authentication Failure (Brute-Force / Credential Stuffing)", severity=if(is_compromised=="Yes", "Critical", "High"), dest="millibluesec.online", time_formatted=strftime(now(), "%Y-%m-%d %H:%M:%S"), recommendation="Enforce Account Lockout policies after 5 failed attempts. Implement Multi-Factor Authentication (MFA) and CAPTCHA on all login endpoints. Review if the account was successfully compromised."
